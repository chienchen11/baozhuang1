        const pageCount = 4;

        // A. 内部嵌套的主书本
        const bookGroup = new THREE.Group();
        bookGroup.position.y = -0.2; 
        scene.add(bookGroup);

            const mats = [matPaper, matPaper, matPaper, matPaper, matPaper, matPaper];
            const pageMesh = new THREE.Mesh(new THREE.BoxGeometry(bookW, pageThick - 0.003, bookD), mats); 
            pageMesh.position.y = i * pageThick + pageThick/2;
            pageMesh.castShadow = true; pageMesh.receiveShadow = true;
            bookGroup.add(pageMesh);
        }

        // 第四章目录左移以后，把中间空出来的书页底面真正改成黑色
        function turnCenterBlack() {
            bookGroup.children.forEach((pageMesh) => {

                }
            });

        // B. 纯平托盘板（底盒）
        const baseGroup = new THREE.Group();
        scene.add(baseGroup);
        const baseW = bookW + gap * 2 + thick * 2;
        const baseD = bookD + gap * 2 + thick * 2;
        const baseMaterials = [matBoxSide, matBoxSide, matBoxSide, matBaseBottom, matBoxSide, matBoxSide];
        const baseBottomMesh = new THREE.Mesh(new THREE.BoxGeometry(baseW, thick, baseD), baseMaterials);

        baseBottomMesh.receiveShadow = true;
        baseGroup.add(baseBottomMesh);

        // C. 大盒盖（天盖）- 修复：略微垫高内部留出空间，防止叠加的纸张穿透盒顶

        scene.add(lidGroup);
        const lidW = baseW + gap * 2;
        const lidD = baseD + gap * 2;
        const clearance = 0.03; // 为内部多张纸张预留的安全高度
        const lidH = totalBookH + thick + clearance;

        lidTopMesh.position.y = totalBookH + clearance + thick/2;
        lidTopMesh.castShadow = true;
        lidGroup.add(lidTopMesh);

        const lipY = (totalBookH + clearance) / 2; 
        const lipN = new THREE.Mesh(new THREE.BoxGeometry(lidW, lidH, thick), matBoxSide); lipN.position.set(0, lipY, -lidD/2 + thick/2); lipN.castShadow = true; lidGroup.add(lipN);

    panelAutism6.visible = false;

    pivotAutism1.rotation.z = -Math.PI;
    pivotAutism2.rotation.z = Math.PI;
    pivotAutism3.rotation.z = -Math.PI;
    pivotAutism4.rotation.z = Math.PI;
    pivotAutism5.rotation.z = -Math.PI;

    // 自闭症ui1的转轴放在啵啵1下边缘，Y轴压低到啵啵1下方，避免翻出前占住啵啵1的位置
    pivotAutism1FromBobo.position.set(panelBobo1.position.x, -0.004, panelBobo1.position.z + bookD / 2);
    pivotAutism1FromBobo.rotation.x = Math.PI;

    const tl = gsap.timeline({ onComplete: () => isAnimating = false });

    // 第四章目录和啵啵1共同上移一个A4
    tl.to(panelFourthDir.position, {
        z: -bookD * 2,
        duration: 1.1,
        ease: "power2.inOut"
    }, 0);

    tl.to(panelBobo1.position, {
        z: -bookD,
        duration: 1.1,
        ease: "power2.inOut"
    }, 0);

    // 自闭症ui1的转轴同步跟着啵啵1移动到啵啵1下边缘
    tl.to(pivotAutism1FromBobo.position, {
        z: -bookD / 2,
        duration: 1.1,
        ease: "power2.inOut"
    }, 0);

    // 等啵啵1和转轴基本上移到位后，再让ui1显示；此时它还压在啵啵1下方，不会占住啵啵1
    tl.call(() => { panelAutism1.visible = true; }, null, 0.52);

    // 自闭症ui1从啵啵1下面翻折出来
    tl.to(pivotAutism1FromBobo.rotation, {
        x: 0,
        duration: 0.9,
        ease: "power2.inOut"
    }, 0.55);
}

// 阶段 34：点击自闭症ui1，ui1连着啵啵1和第四章目录一起左移5个A4，然后ui2-6从ui1右侧连续展开，ui6停在中心左侧且全程不断开
else if (appState === 33 && hitDragon) {
    isAnimating = true;
    appState = 34;

    tipEl.style.background = "#2ecc71";
    tipEl.innerText = "自闭症ui1带着啵啵1和第四章目录左移，ui2-6已连续展开，ui6在中心左侧且不断开。";

    panelAutism2.visible = true;
    panelAutism3.visible = true;
    panelAutism4.visible = true;
    panelAutism5.visible = true;
    panelAutism6.visible = true;

    pivotAutism1.rotation.z = -Math.PI;
    pivotAutism2.rotation.z = Math.PI;
    pivotAutism3.rotation.z = -Math.PI;
    pivotAutism4.rotation.z = Math.PI;
    pivotAutism5.rotation.z = -Math.PI;

    const tl = gsap.timeline({
        onComplete: () => {
            panelFourthDir.position.x = -bookW * 6;
            panelBobo1.position.x = -bookW * 6;
            pivotAutism1FromBobo.position.x = -bookW * 6;
            pivotAutism1.rotation.z = 0;
            pivotAutism2.rotation.z = 0;
            pivotAutism3.rotation.z = 0;
            pivotAutism4.rotation.z = 0;
            pivotAutism5.rotation.z = 0;
            isAnimating = false;
        }
    });

    // 自闭症ui1、啵啵1、第四章目录整体同时向左移动5个A4
    tl.to(panelFourthDir.position, {
        x: -bookW * 6,
        duration: 1.25,
        ease: "power2.inOut"
    }, 0);

    tl.to(panelBobo1.position, {
        x: -bookW * 6,
        duration: 1.25,
        ease: "power2.inOut"
    }, 0);

    tl.to(pivotAutism1FromBobo.position, {
        x: -bookW * 6,
        duration: 1.25,
        ease: "power2.inOut"
    }, 0);

    // 自闭症ui2-6从自闭症ui1右边连续逐页翻折展开；最终ui6停在中心左侧，且ui6连着ui5不断开
    tl.to(pivotAutism1.rotation, { z: 0, duration: 1.0, ease: "power2.inOut" }, 0.35)
      .to(pivotAutism2.rotation, { z: 0, duration: 1.0, ease: "power2.inOut" }, 0.55)
      .to(pivotAutism3.rotation, { z: 0, duration: 1.0, ease: "power2.inOut" }, 0.75)
      .to(pivotAutism4.rotation, { z: 0, duration: 1.0, ease: "power2.inOut" }, 0.95)
      .to(pivotAutism5.rotation, { z: 0, duration: 1.0, ease: "power2.inOut" }, 1.15);
}

// 阶段 35：再次点击自闭症ui1，收回自闭症ui2-6，并让自闭症ui1回到中心左边位置
else if (appState === 34 && hitDragon) {
    isAnimating = true;
    appState = 35;

    tipEl.style.background = "#e74c3c";
    tipEl.innerText = "自闭症ui2、3、4、5、6已收回，自闭症ui1回到中心左边。再次点击进入第四章结尾。";

    const tl = gsap.timeline({
        onComplete: () => {
            panelAutism2.visible = false;
            panelAutism3.visible = false;
            panelAutism4.visible = false;
            panelAutism5.visible = false;
            panelAutism6.visible = false;

            // 锁定中心左边位置：第四章目录、啵啵1、自闭症ui1保持同一列
            panelFourthDir.position.x = -bookW;
            panelBobo1.position.x = -bookW;
            pivotAutism1FromBobo.position.x = -bookW;

            pivotAutism1.rotation.z = -Math.PI;
            pivotAutism2.rotation.z = Math.PI;
            pivotAutism3.rotation.z = -Math.PI;
            pivotAutism4.rotation.z = Math.PI;
            pivotAutism5.rotation.z = -Math.PI;

            isAnimating = false;
        }
    });

    // ui6 -> ui2 反向连续收回，保持整条链不断开
    tl.to(pivotAutism5.rotation, { z: -Math.PI, duration: 0.75, ease: "power2.inOut" }, 0)
      .to(pivotAutism4.rotation, { z: Math.PI, duration: 0.75, ease: "power2.inOut" }, 0.15)
      .to(pivotAutism3.rotation, { z: -Math.PI, duration: 0.75, ease: "power2.inOut" }, 0.30)
      .to(pivotAutism2.rotation, { z: Math.PI, duration: 0.75, ease: "power2.inOut" }, 0.45)
      .to(pivotAutism1.rotation, { z: -Math.PI, duration: 0.75, ease: "power2.inOut" }, 0.60);

    // 收回的同时，第四章目录、啵啵1、自闭症ui1一起回到中心左边
    tl.to(panelFourthDir.position, { x: -bookW, duration: 1.1, ease: "power2.inOut" }, 0.65);
    tl.to(panelBobo1.position, { x: -bookW, duration: 1.1, ease: "power2.inOut" }, 0.65);
    tl.to(pivotAutism1FromBobo.position, { x: -bookW, duration: 1.1, ease: "power2.inOut" }, 0.65);
}

// 阶段 36：再次点击自闭症ui1，第四章目录、啵啵1、自闭症ui1全部上移一个A4，从自闭症ui1下面翻折出第四章结尾
else if (appState === 35 && hitDragon) {
    isAnimating = true;
    appState = 36;

    tipEl.style.background = "#34495e";
    tipEl.innerText = "第四章结尾已从自闭症ui1下面翻折出来。";

    // 确保第四章结尾初始隐藏在自闭症ui1下面，并且转轴贴住自闭症ui1下面那条边
    panelChapter4End.visible = false;
    pivotChapter4EndFromAutism.rotation.x = Math.PI;

    const targetFourthZ = panelFourthDir.position.z - bookD;
    const targetBoboZ = panelBobo1.position.z - bookD;
    const targetAutismPivotZ = pivotAutism1FromBobo.position.z - bookD;
    const startChapterPivotZ = pivotAutism1FromBobo.position.z + bookD;
    const targetChapterPivotZ = targetAutismPivotZ + bookD;

    pivotChapter4EndFromAutism.position.set(
        pivotAutism1FromBobo.position.x,
        -0.006,
        startChapterPivotZ
    );

    const tl = gsap.timeline({
        onComplete: () => {
            panelFourthDir.position.z = targetFourthZ;
            panelBobo1.position.z = targetBoboZ;
            pivotAutism1FromBobo.position.z = targetAutismPivotZ;
            pivotChapter4EndFromAutism.position.z = targetChapterPivotZ;
            pivotChapter4EndFromAutism.rotation.x = 0;
            panelChapter4End.visible = true;
            isAnimating = false;
        }
    });

    // 三张主页面共同上移一个A4
    tl.to(panelFourthDir.position, { z: targetFourthZ, duration: 1.15, ease: "power2.inOut" }, 0);
    tl.to(panelBobo1.position, { z: targetBoboZ, duration: 1.15, ease: "power2.inOut" }, 0);
    tl.to(pivotAutism1FromBobo.position, { z: targetAutismPivotZ, duration: 1.15, ease: "power2.inOut" }, 0);
    tl.to(pivotChapter4EndFromAutism.position, { z: targetChapterPivotZ, duration: 1.15, ease: "power2.inOut" }, 0);

    // 移动到位后，第四章结尾从自闭症ui1下面翻折出来
    tl.call(() => { panelChapter4End.visible = true; }, null, 0.70);
    tl.to(pivotChapter4EndFromAutism.rotation, { x: 0, duration: 0.95, ease: "power2.inOut" }, 0.72);
}
            }
        });

        // =================【 6. 渲染循环 】=================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
